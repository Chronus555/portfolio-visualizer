services:
  # ── Backend API (FastAPI + Docker) ─────────────────────────────────────────
  - type: web
    name: portfolio-visualizer-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: PORT
        value: "8000"

  # ── Frontend (React static site) ──────────────────────────────────────────
  - type: web
    name: portfolio-visualizer
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        value: https://portfolio-visualizer-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
