version: "3.9"

services:
  backend:
    build: ./backend
    container_name: pv-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: pv-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
